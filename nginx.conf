# =============================================================================
# Nginx Configuration for QRIS Payment Gateway
# Reverse proxy from public domain to Next.js Unix Domain Socket
# =============================================================================
#
# Place this file in /etc/nginx/sites-available/ and create a symlink:
#   sudo ln -s /etc/nginx/sites-available/pgqiospay.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream nextjs_backend {
    # Connect to Next.js via Unix Domain Socket
    server unix:/tmp/nextjs-payment.sock;
}

server {
    listen 80;
    server_name payment.yourdomain.com;  # Change to your domain

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max request body size (for webhooks and file uploads)
    client_max_body_size 10M;

    # Proxy settings
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching (Next.js _next/static)
    location /_next/static {
        proxy_pass http://nextjs_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://nextjs_backend;
        proxy_cache_valid 200 60m;
    }

    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    # Access and error logs
    access_log /var/log/nginx/pgqiospay-access.log;
    error_log /var/log/nginx/pgqiospay-error.log;
}

